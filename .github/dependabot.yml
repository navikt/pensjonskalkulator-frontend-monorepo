# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2

registries:
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{ secrets.READER_TOKEN }}
    replaces-base: true

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /
    registries:
      - npm-github
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'
        update-types:
          - minor
          - patch
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@playwright/*'
          - '@testing-library/*'
        update-types:
          - minor
          - patch
      tooling:
        patterns:
          - 'vite'
          - '@vitejs/*'
          - 'eslint*'
          - 'typescript'
          - 'prettier*'
        update-types:
          - minor
          - patch
      minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
