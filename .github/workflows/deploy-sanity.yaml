name: Deploy sanity

on:
  push:
    branches:
      - main
    paths:
      - 'packages/sanity/**'
      - '.github/workflows/deploy-sanity.yaml'
  workflow_dispatch:
    inputs:
      sanity:
        description: Deploy Sanity
        type: boolean
        required: false

jobs:
  build:
    name: Build application
    runs-on: ubuntu-latest
    permissions:
      id-token: 'write'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build staging application
        run: npm run sanity-build

      - name: Save build folder
        uses: actions/upload-artifact@v6
        with:
          name: dist-sanity
          path: dist-sanity
          if-no-files-found: error
          retention-days: 1

      - name: Create Docker image
        id: image-creation
        uses: nais/docker-build-push@v0
        with:
          image_suffix: sanity
          dockerfile: packages/sanity/.docker/Dockerfile-sanity
          team: pensjonskalkulator
    outputs:
      image: ${{ steps.image-creation.outputs.image }}

  deploy-prod:
    name: Deploy to production
    needs: [build]
    permissions:
      id-token: 'write'
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.sanity == 'true')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to production
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          IMAGE: ${{ needs.build.outputs.image }}
          RESOURCE: packages/sanity/.nais/deploy-sanity-prod.yml
