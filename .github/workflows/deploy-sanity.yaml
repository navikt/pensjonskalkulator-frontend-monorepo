name: Deploy sanity

on:
  push:
    branches:
      - main
    paths:
      - 'packages/sanity/**'
      - '.github/workflows/deploy-sanity.yaml'
  workflow_dispatch:
    inputs:
      sanity:
        description: Deploy Sanity
        type: boolean
        required: false

jobs:
  build:
    name: Build application
    runs-on: ubuntu-latest
    permissions:
      id-token: 'write'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          reader-token: ${{ secrets.READER_TOKEN }}

      - name: Build Sanity studio
        run: pnpm --filter @pensjonskalkulator-frontend-monorepo/sanity build

      - name: Save build folder
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-sanity
          path: packages/sanity/dist
          if-no-files-found: error
          retention-days: 1

      - name: Create Docker image
        id: image-creation
        uses: nais/docker-build-push@751a312f0803eb96a05a41fadf51be19b7be362c # v0
        with:
          image_suffix: sanity
          dockerfile: packages/sanity/.docker/Dockerfile-sanity
          docker_context: .
          team: pensjonskalkulator
    outputs:
      image: ${{ steps.image-creation.outputs.image }}

  deploy-prod:
    name: Deploy to production
    needs: [build]
    permissions:
      id-token: 'write'
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.sanity == 'true')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Deploy to production
        uses: nais/deploy/actions/deploy@d57354b433c8d6847ab092467d9fe976a3d008aa # v2
        env:
          CLUSTER: prod-gcp
          IMAGE: ${{ needs.build.outputs.image }}
          RESOURCE: packages/sanity/.nais/deploy-sanity-prod.yml
