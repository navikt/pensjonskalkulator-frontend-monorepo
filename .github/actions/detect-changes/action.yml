name: 'Detect changes'
description: 'Detect which apps and packages have changed'

outputs:
  intern:
    description: 'Whether apps/intern has changed'
    value: ${{ steps.result.outputs.intern }}
  ekstern:
    description: 'Whether apps/ekstern has changed'
    value: ${{ steps.result.outputs.ekstern }}
  api:
    description: 'Whether packages/api has changed'
    value: ${{ steps.result.outputs.api }}
  lockfile:
    description: 'Whether pnpm-lock.yaml has changed'
    value: ${{ steps.result.outputs.lockfile }}
  shared:
    description: 'Whether shared config files have changed'
    value: ${{ steps.result.outputs.shared }}

runs:
  using: 'composite'
  steps:
    - name: Check for changes
      if: github.event_name != 'schedule'
      uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
      id: changes
      with:
        filters: |
          intern:
            - 'apps/intern/**'
          ekstern:
            - 'apps/ekstern/**'
          api:
            - 'packages/api/**'
          lockfile:
            - 'pnpm-lock.yaml'
          shared:
            - 'package.json'
            - 'pnpm-lock.yaml'
            - 'tsconfig.base.json'
            - '.github/**'

    - name: Set outputs
      id: result
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "schedule" ]; then
          echo "intern=true" >> $GITHUB_OUTPUT
          echo "ekstern=true" >> $GITHUB_OUTPUT
          echo "api=true" >> $GITHUB_OUTPUT
          echo "lockfile=false" >> $GITHUB_OUTPUT
          echo "shared=true" >> $GITHUB_OUTPUT
        else
          echo "intern=${{ steps.changes.outputs.intern }}" >> $GITHUB_OUTPUT
          echo "ekstern=${{ steps.changes.outputs.ekstern }}" >> $GITHUB_OUTPUT
          echo "api=${{ steps.changes.outputs.api }}" >> $GITHUB_OUTPUT
          echo "lockfile=${{ steps.changes.outputs.lockfile }}" >> $GITHUB_OUTPUT
          echo "shared=${{ steps.changes.outputs.shared }}" >> $GITHUB_OUTPUT
        fi
