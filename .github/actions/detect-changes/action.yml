name: 'Detect changes'
description: 'Detect which apps and packages have changed'

outputs:
  intern:
    description: 'Whether apps/intern has changed'
    value: ${{ steps.changes.outputs.intern }}
  ekstern:
    description: 'Whether apps/ekstern has changed'
    value: ${{ steps.changes.outputs.ekstern }}
  api:
    description: 'Whether packages/api has changed'
    value: ${{ steps.changes.outputs.api }}
  lockfile:
    description: 'Whether pnpm-lock.yaml has changed'
    value: ${{ steps.changes.outputs.lockfile }}
  shared:
    description: 'Whether shared config files have changed'
    value: ${{ steps.changes.outputs.shared }}

runs:
  using: 'composite'
  steps:
    - name: Check for changes
      if: github.event_name != 'schedule'
      uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
      id: changes
      with:
        filters: |
          intern:
            - 'apps/intern/**'
          ekstern:
            - 'apps/ekstern/**'
          api:
            - 'packages/api/**'
          lockfile:
            - 'pnpm-lock.yaml'
          shared:
            - 'package.json'
            - 'pnpm-lock.yaml'
            - 'tsconfig.base.json'
            - '.github/**'

    # On schedule, mark everything as changed so all apps rebuild with fresh base images
    - name: Force all outputs on schedule
      if: github.event_name == 'schedule'
      id: changes
      shell: bash
      run: |
        echo "intern=true" >> $GITHUB_OUTPUT
        echo "ekstern=true" >> $GITHUB_OUTPUT
        echo "api=true" >> $GITHUB_OUTPUT
        echo "lockfile=false" >> $GITHUB_OUTPUT
        echo "shared=true" >> $GITHUB_OUTPUT
